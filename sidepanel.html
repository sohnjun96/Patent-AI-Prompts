<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KR Patent Sidebar</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div>
          <h1>KR Patent Sidebar</h1>
          <p id="chatgptTargetInfo" class="metaText"></p>
        </div>
        <div class="topbarActions">
          <button id="refreshSidebarBtn" type="button" class="ghostButton">
            새로고침
          </button>
          <button id="openFullPageBtn" type="button">풀페이지 열기</button>
        </div>
      </header>

      <section id="sidebarStatus" class="statusBar" aria-live="polite">
        대기 중
      </section>

      <section class="card">
        <h2>청구항 보기</h2>
        <label for="claimSelect" class="blockLabel">청구항 선택</label>
        <select id="claimSelect"></select>
        <pre id="claimContent" class="claimContent empty">
아직 청구항 데이터가 없습니다.</pre
        >
      </section>

      <section class="card">
        <h2>프롬프트 입력 설정</h2>
        <label class="blockLabel">검색 기반 선택</label>
        <div class="selectGroup">
          <label class="checkLine">
            <input
              id="sourceModeSummary"
              type="radio"
              name="sourceMode"
              value="summary"
              checked
            />
            발명의 요약 사용
          </label>
          <label class="checkLine">
            <input
              id="sourceModeDescription"
              type="radio"
              name="sourceMode"
              value="description"
            />
            발명의 설명 사용
          </label>
        </div>
      </section>

      <section class="card">
        <h2>프롬프트 생성/전송</h2>
        <p class="metaText">
          각 카드에서 입력값을 채우고 생성한 뒤, 바로 ChatGPT로 전송할 수 있습니다.
        </p>

        <div class="promptGrid">
          <article class="promptCard">
            <div class="promptCardHead">
              <h3>1. 인용발명 검색</h3>
              <div class="promptActions">
                <button
                  class="generatePromptBtn ghostButton"
                  data-kind="citationSearch"
                  type="button"
                >
                  생성
                </button>
                <button
                  class="sendPromptBtn"
                  data-kind="citationSearch"
                  type="button"
                >
                  전송
                </button>
              </div>
            </div>
            <label class="promptFieldLabel" for="citationCutoffDateInput">
              특허판단 기준일
            </label>
            <input
              id="citationCutoffDateInput"
              class="promptFieldInput"
              type="date"
            />
            <div id="promptPreview-citationSearch" class="promptPreview empty">
              아직 생성된 프롬프트가 없습니다.
            </div>
          </article>

          <article class="promptCard">
            <div class="promptCardHead">
              <h3>2. 진보성 판단</h3>
              <div class="promptActions">
                <button
                  class="generatePromptBtn ghostButton"
                  data-kind="inventiveStep"
                  type="button"
                >
                  생성
                </button>
                <button
                  class="sendPromptBtn"
                  data-kind="inventiveStep"
                  type="button"
                >
                  전송
                </button>
              </div>
            </div>
            <label class="promptFieldLabel" for="inventiveStepCitationNumbersInput">
              검토할 인용발명 번호
            </label>
            <input
              id="inventiveStepCitationNumbersInput"
              class="promptFieldInput"
              type="text"
              placeholder="예: 1, 2, 5"
            />
            <div id="promptPreview-inventiveStep" class="promptPreview empty">
              아직 생성된 프롬프트가 없습니다.
            </div>
          </article>

          <article class="promptCard">
            <div class="promptCardHead">
              <h3>3. 증거찾기</h3>
              <div class="promptActions">
                <button
                  class="generatePromptBtn ghostButton"
                  data-kind="evidenceFind"
                  type="button"
                >
                  생성
                </button>
                <button class="sendPromptBtn" data-kind="evidenceFind" type="button">
                  전송
                </button>
              </div>
            </div>
            <div class="promptFieldRow">
              <div>
                <label class="promptFieldLabel" for="evidenceClaimNumberInput">
                  증거를 찾을 청구항 번호
                </label>
                <input
                  id="evidenceClaimNumberInput"
                  class="promptFieldInput"
                  type="number"
                  min="1"
                  step="1"
                  placeholder="예: 1"
                />
              </div>
              <div>
                <label
                  class="promptFieldLabel"
                  for="evidenceCitationNumbersInput"
                >
                  검토할 인용발명 번호
                </label>
                <input
                  id="evidenceCitationNumbersInput"
                  class="promptFieldInput"
                  type="text"
                  placeholder="비우면 2번 카드 번호 사용"
                />
              </div>
            </div>
            <div id="promptPreview-evidenceFind" class="promptPreview empty">
              아직 생성된 프롬프트가 없습니다.
            </div>
          </article>

          <article class="promptCard">
            <div class="promptCardHead">
              <h3>4. 논문 인용문구 정리</h3>
              <div class="promptActions">
                <button
                  class="generatePromptBtn ghostButton"
                  data-kind="citationFormat"
                  type="button"
                >
                  생성
                </button>
                <button
                  class="sendPromptBtn"
                  data-kind="citationFormat"
                  type="button"
                >
                  전송
                </button>
              </div>
            </div>
            <label class="promptFieldLabel" for="citationFormatNumbersInput">
              인용발명 번호
            </label>
            <input
              id="citationFormatNumbersInput"
              class="promptFieldInput"
              type="text"
              placeholder="예: 2, 4"
            />
            <div id="promptPreview-citationFormat" class="promptPreview empty">
              아직 생성된 프롬프트가 없습니다.
            </div>
          </article>
        </div>
      </section>
    </div>

    <script src="sidepanel.js"></script>
  </body>
</html>
